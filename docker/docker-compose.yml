# =============================================================================
# RIO Protocol — Docker Compose
# =============================================================================
# Usage:
#   cd docker
#   docker compose up --build        # foreground
#   docker compose up --build -d     # detached
#   docker compose down              # stop
#   docker compose logs -f           # follow logs
# =============================================================================

services:

  # -------------------------------------------------------------------------
  # RIO Dashboard + API (single service — all routes served by FastAPI)
  # -------------------------------------------------------------------------
  rio-dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rio-dashboard
    ports:
      - "${RIO_DASHBOARD_PORT:-8050}:8050"
    environment:
      - RIO_ENV=${RIO_ENV:-local}
      - RIO_MODE=${RIO_MODE:-simulated}
      - RIO_LOG_LEVEL=${RIO_LOG_LEVEL:-INFO}
      - RIO_DASHBOARD_HOST=0.0.0.0
      - RIO_DASHBOARD_PORT=8050
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@rio.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change_me}
    volumes:
      # Persist data across container restarts
      - rio-data:/app/runtime/data
      - rio-keys:/app/runtime/keys
      - rio-governance:/app/runtime/governance
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8050/')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # -------------------------------------------------------------------------
  # RIO API (optional separate instance for API-only access)
  # -------------------------------------------------------------------------
  rio-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rio-api
    ports:
      - "${RIO_API_PORT:-8000}:8000"
    environment:
      - RIO_ENV=${RIO_ENV:-local}
      - RIO_MODE=${RIO_MODE:-simulated}
      - RIO_LOG_LEVEL=${RIO_LOG_LEVEL:-INFO}
      - RIO_DASHBOARD_HOST=0.0.0.0
      - RIO_DASHBOARD_PORT=8000
    volumes:
      - rio-data:/app/runtime/data
      - rio-keys:/app/runtime/keys
      - rio-governance:/app/runtime/governance
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

# ---------------------------------------------------------------------------
# Named volumes for data persistence
# ---------------------------------------------------------------------------
volumes:
  rio-data:
    driver: local
  rio-keys:
    driver: local
  rio-governance:
    driver: local
